name: jaspr_snake
description: Jaspr Web frontend for the shared Snake game logic.
version: 0.0.1
publish_to: none

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  jaspr: ^0.22.3
  snake:
    path: ../snake
  universal_web: ^1.1.1

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.4.15
  jaspr_builder: ^0.22.3
  very_good_analysis: ^7.0.0

jaspr:
  mode: static
